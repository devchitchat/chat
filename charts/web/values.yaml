# Host paths for backups, accessible from within the Lima VM.
# Lima mounts your home directory at the same path inside the VM, so these are
# regular host paths — no special volume flags needed at cluster creation.
# Set the actual paths in values.local.yaml (gitignored). Leave empty to disable.
#
# Example:
#   dbBackupNodePath: /Users/yourname/backups/chat-web/db-backups
#   uploadsBackupNodePath: /Users/yourname/backups/chat-web/uploads-backups
dbBackupNodePath: ""
uploadsBackupNodePath: ""
