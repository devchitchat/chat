apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-web
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chat-web
  replicas: 1
  template:
    metadata:
      labels:
        app: chat-web
    spec:
      containers:
      - name: chat-web
        image: local/chat-web:2.0.5
        imagePullPolicy: IfNotPresent
        env:
        - name: PORT
          value: "8080"
        - name: NODE_ENV
          value: "production"
        - name: DB_PATH
          value: "/var/lib/chat/chat.db"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: chat-data
          mountPath: /var/lib/chat
      volumes:
      - name: chat-data
        persistentVolumeClaim:
          claimName: chat-web-sqlite
---
apiVersion: v1
kind: Service
metadata:
  name: chat-web-service
spec:
  selector:
    app: chat-web
  ports:
    - protocol: TCP
      port: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chat-web-sqlite
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
