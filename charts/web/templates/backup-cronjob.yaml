apiVersion: batch/v1
kind: CronJob
metadata:
  name: chat-backup
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: local/chat-web:3.0.10
            workingDir: /app
            command:
            - sh
            - -c
            - |
              bun backup && bun backup-uploads
            env:
            - name: DB_PATH
              value: /var/lib/chat/chat.db
            - name: BACKUP_DIR
              value: {{ if .Values.dbBackupNodePath }}{{ .Values.dbBackupNodePath }}{{ else }}/var/lib/chat/backups{{ end }}
            - name: UPLOAD_DIR
              value: /var/lib/chat/uploads
            - name: UPLOADS_BACKUP_DIR
              value: {{ if .Values.uploadsBackupNodePath }}{{ .Values.uploadsBackupNodePath }}{{ else }}/var/lib/chat/backups/uploads{{ end }}
            volumeMounts:
            - name: chat-data
              mountPath: /var/lib/chat
              readOnly: true
            {{- if .Values.dbBackupNodePath }}
            - name: db-backups
              mountPath: {{ .Values.dbBackupNodePath }}
            {{- end }}
            {{- if .Values.uploadsBackupNodePath }}
            - name: uploads-backups
              mountPath: {{ .Values.uploadsBackupNodePath }}
            {{- end }}
          restartPolicy: OnFailure
          volumes:
          - name: chat-data
            persistentVolumeClaim:
              claimName: chat-web-sqlite
          {{- if .Values.dbBackupNodePath }}
          - name: db-backups
            hostPath:
              path: {{ .Values.dbBackupNodePath }}
              type: DirectoryOrCreate
          {{- end }}
          {{- if .Values.uploadsBackupNodePath }}
          - name: uploads-backups
            hostPath:
              path: {{ .Values.uploadsBackupNodePath }}
              type: DirectoryOrCreate
          {{- end }}
